  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <button class="btn btn-ghost btn-sm mobile-menu-btn" onclick="toggleSidebar()">

        </svg>
      </button>
      <h2 id="page-title">ประวัติการตัด Stock</h2>
      <div class="topbar-right">
        <span class="badge badge-date" id="today-date"></span>
        <button class="btn btn-ghost btn-sm" onclick="refreshAll()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
          </svg>
          รีเฟรช
        </button>
      </div>
    </div>

    <!-- ===== HISTORY CONTENT ===== -->
    <div class="page" id="page-history">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;">
        <div class="search-wrap">
          <input class="search-input" type="text" id="hs-search" placeholder="ค้นหาประวัติ (ชื่อ, รหัส, batch, หมายเหตุ)..." oninput="filterHistory()">
        </div>
        
        <div class="form-group" style="margin: 0; width: 200px;">
          <select id="hs-date-filter" onchange="filterHistory()" style="width: 100%; height: 38px;">
            <option value="">— วันที่ทำรายการทั้งหมด —</option>
          </select>
        </div>
        
        <div class="form-group" style="margin: 0; width: 200px;">
          <select id="hs-factory-filter" onchange="filterHistory()" style="width: 100%; height: 38px;">
            <option value="">— โรงงานทั้งหมด —</option>
            <option value="PT">PT (ทั่วไป)</option>
            <option value="CH">Chonburi (CH)</option>
            <option value="SR">Surat Thani (SR)</option>
            <option value="KR">Korat (KR)</option>
            <option value="NS">Nakhon Sawan (NS)</option>
          </select>
        </div>
      </div>

      <div class="table-wrapper">
        <div class="table-scroll">
          <table>
            <thead>
              <!-- Headers dynamically rendered -->
            </thead>
            <tbody id="hs-tbody">
              <tr><td colspan="7" class="loading"><div class="spinner"></div> กำลังโหลด...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination">
          <span id="hs-page-info">—</span>
          <div class="page-btns" id="hs-page-btns"></div>
        </div>
      </div>
    </div>
